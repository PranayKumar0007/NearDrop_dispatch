name: neardrop
description: NearDrop - Intelligent last-mile delivery recovery platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  web_socket_channel: ^2.4.0
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0
  permission_handler: ^11.3.0
  geolocator: ^11.0.0
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  record: ^5.1.0
  http: ^1.2.1
  jwt_decoder: ^2.0.1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  equatable: ^2.0.5
  get_it: ^7.6.7
  injectable: ^2.3.2
  fl_chart: ^0.67.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  injectable_generator: ^2.4.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
